global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:3000']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: 'profile-service'
    static_configs:
      - targets: ['host.docker.internal:3002']

  - job_name: 'chat-service'
    static_configs:
      - targets: ['host.docker.internal:3003']

  - job_name: 'search-service'
    static_configs:
      - targets: ['host.docker.internal:3004']

  - job_name: 'recommendations-service'
    static_configs:
      - targets: ['host.docker.internal:3005']

  - job_name: 'media-service'
    static_configs:
      - targets: ['host.docker.internal:3006']

  - job_name: 'notifications-service'
    static_configs:
      - targets: ['host.docker.internal:3007']
